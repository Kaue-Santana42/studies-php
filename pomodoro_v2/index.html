<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/257557e977.js" crossorigin="anonymous"></script>

    <title>Pomodoro Timer</title>
</head>
<body class="dark-theme">
    
    <div class="app-container">

        <header class="app-header">
            <div class="logo">
                <span>Pomodoro Timer</span>
            </div>

            <div class="header-options">
                <button type="button" id="btnSettings" class="icon-button" aria-label="Settings">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button type="button" id="btnHistory" class="icon-button" aria-label="History">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
            </div>
        </header>

        <main class="timer-section">
            <div class="timer-circle-container">

                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring__background" cx="150" cy="150" r="135" stroke-width="8" fill="transparent"/>
                    <circle class="progress-ring__circle" cx="150" cy="150" r="135" stroke-width="8" fill="transparent"/>
                </svg>

                <div class="timer-display-controls">
                    <div id="theTimer">25:00</div>
                    <div class="quick-actions">
                        <button type="button" id="btnPlayPause" class="control-button" aria-label="Start/Pause">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button type="button" id="btnReset" class="control-button" aria-label="Restart">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                </div>

            </div>
        </main>

        <nav id="modesMenu" class="modes-panel collapsed">

            <button type="button" id="btnToggleMenu" class="menu-trigger" aria-label="Expand modes">
                <i class="fa-solid fa-chevron-down" id="arrowIcon"></i>
            </button>

            <div class="modes-list">
                <button type="button" class="mode-option active" data-mode="1">Focus</button>
                <button type="button" class="mode-option active" data-mode="2">Short Break</button>
                <button type="button" class="mode-option active" data-mode="3">Long Break</button>
            </div>

        </nav>

    </div>

    <script src="script.js"></script>
</body>
</html>
